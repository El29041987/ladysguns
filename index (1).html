<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkSpace — e-commerce портал</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{font-size:13px;background:#f8f7ff;color:#1a1a2e}
.portal{display:flex;height:100vh;overflow:hidden}
.sb{width:210px;background:#f0effe;border-right:1px solid #e0dcff;display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s}
.lb{background:#534AB7;border-radius:8px;padding:9px 12px;margin:12px}
.lb-t{color:#EEEDFE;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.lb-s{color:#AFA9EC;font-size:10px;margin-top:2px;padding-left:4px}
#snav{flex:1;padding:5px;overflow-y:auto}
.ua{padding:9px 12px;border-top:1px solid #e0dcff;display:flex;align-items:center;gap:8px;cursor:pointer}
.ua:hover{background:#e8e4ff}
#ca{flex:1;overflow-y:auto;background:#fff;min-width:0}
#ct{padding:16px}
.n1,.n2,.n3{display:flex;align-items:center;cursor:pointer;border-radius:7px;margin-bottom:1px;color:#6b7280;user-select:none}
.n1{gap:8px;padding:7px 10px;font-size:12px}
.n2{gap:7px;padding:5px 10px 5px 22px;font-size:11px}
.n3{gap:5px;padding:4px 10px 4px 38px;font-size:11px}
.n1:hover,.n2:hover,.n3:hover{background:#fff;color:#1a1a2e}
.nac{background:#fff!important;color:#534AB7!important;font-weight:600!important}
.nsep{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#9ca3af;padding:7px 22px 3px;font-weight:500}
.sbd{background:#E24B4A;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:auto;font-weight:500}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
.tag{font-size:10px;padding:2px 7px;border-radius:8px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;flex-wrap:wrap;gap:8px}
.ph-t{font-size:15px;font-weight:600;color:#1a1a2e}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:13px}
.sc{background:#f8f7ff;border-radius:8px;padding:11px}
.sc-v{font-size:18px;font-weight:600;margin:4px 0 2px}
.sc-l{font-size:10px;color:#6b7280}
.tabs{display:flex;border-bottom:1px solid #e5e7eb;margin-bottom:12px;flex-wrap:wrap}
.tbi{padding:7px 14px;font-size:12px;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px}
.tbi.on{color:#534AB7;border-bottom-color:#534AB7;font-weight:600}
.cw{border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
.cm{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:7px}.msg.me{flex-direction:row-reverse}
.bub{padding:7px 10px;border-radius:14px;font-size:12px;max-width:75%;line-height:1.5}
.bo{background:#f8f7ff;color:#1a1a2e}.bm{background:#534AB7;color:#EEEDFE}
.ma{font-size:10px;color:#9ca3af;margin-bottom:2px}
.mt{font-size:10px;color:#9ca3af;margin-top:2px}
.cb{display:flex;gap:7px;padding:8px 10px;border-top:1px solid #e5e7eb;flex-shrink:0}
.cb input{flex:1;font-size:12px;border:1px solid #e5e7eb;border-radius:7px;padding:6px 10px;outline:none}
.cb input:focus{border-color:#534AB7}
button{background:#f0effe;color:#534AB7;border:1px solid #d4d0ff;border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit}
button:hover{background:#e8e4ff}
.sbtn{background:#534AB7;color:#EEEDFE;border:none;border-radius:7px;padding:0 12px;cursor:pointer;font-size:13px;height:34px}
.trow{display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid #f3f4f6}
.trow:hover{background:#fafafa}
.trow:last-child{border-bottom:none}
.tth{font-size:10px;font-weight:500;color:#9ca3af;padding:6px 13px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:9px;background:#fafafa}
.ai-btn{background:#534AB7;color:#EEEDFE;border:none;border-radius:7px;padding:5px 11px;cursor:pointer;font-size:11px;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.ai-btn:hover{background:#3C3489}
.ai-spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#EEEDFE;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.rv-card{border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:9px}
.rv-card:hover{border-color:#d4d0ff}
.k-col{background:#f8f7ff;border-radius:10px;padding:11px}
.k-card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:9px;margin-bottom:6px;cursor:pointer}
.k-card:hover{border-color:#d4d0ff}
input[type=text],textarea{font-family:inherit}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:380px;max-width:90vw}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px;color:#1a1a2e}
.modal label{font-size:11px;color:#6b7280;display:block;margin-bottom:3px;margin-top:10px}
.modal input,.modal textarea,.modal select{width:100%;border:1px solid #e5e7eb;border-radius:7px;padding:7px 10px;font-size:12px;outline:none;font-family:inherit}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:#534AB7}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.btn-cancel{background:#f3f4f6;color:#6b7280;border:none}
.btn-save{background:#534AB7;color:#fff;border:none}
/* Mobile */
.mob-topbar{display:none;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #e0dcff;background:#f0effe;flex-shrink:0}
.hamburger{background:#fff;border:1px solid #e0dcff;border-radius:7px;padding:6px 10px;cursor:pointer;font-size:16px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:30}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:54px;background:#f0effe;border-top:1px solid #e0dcff;z-index:20;justify-content:space-around;align-items:center}
.mob-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 10px;border-radius:7px;color:#6b7280;font-size:10px;background:none;border:none}
.mob-nav-btn.on{color:#534AB7;font-weight:600}
@media(max-width:640px){
  .portal{flex-direction:column}
  .sb{position:fixed;top:0;left:0;bottom:0;z-index:40;transform:translateX(-100%);width:230px}
  .sb.open{transform:translateX(0)}
  .mob-topbar{display:flex}
  #ca{padding-bottom:60px}
  .mob-nav{display:flex}
  .overlay{z-index:35}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(2,1fr)}
  .tth,.trow{font-size:10px}
}
</style>
</head>
<body>
<div class="portal">

<!-- SIDEBAR -->
<div class="sb" id="sb">
  <div>
    <div class="lb">
      <div class="lb-t">🏪 WorkSpace</div>
      <div class="lb-s">e-commerce команда</div>
    </div>
  </div>
  <div id="snav"></div>
  <div class="ua" onclick="go('prof',false)">

    <div>
      <div style="font-size:11px;font-weight:600;color:#1a1a2e">Алексей Петров</div>
      <div style="font-size:10px;color:#1D9E75">● Онлайн</div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="ca" style="flex:1;overflow-y:auto;background:#fff;min-width:0;display:flex;flex-direction:column">
  <div class="mob-topbar">
    <div style="font-size:13px;font-weight:600;color:#1a1a2e" id="mob-title">WorkSpace</div>
    <button class="hamburger" onclick="toggleSB()">☰</button>
  </div>
  <div id="ct" style="padding:16px;flex:1"></div>
  <div class="mob-nav">
    <button class="mob-nav-btn" onclick="go('sup-dash',false);mobAct(this)">📊<span>Остатки</span></button>
    <button class="mob-nav-btn" onclick="go('rv-reviews',false);mobAct(this)">⭐<span>Отзывы</span></button>
    <button class="mob-nav-btn" onclick="go('taskhub',false);mobAct(this)">🎯<span>Задачи</span></button>
    <button class="mob-nav-btn" onclick="go('notif',false);mobAct(this)">🔔<span>Уведом.</span></button>
    <button class="mob-nav-btn" onclick="go('prof',false);mobAct(this)">👤<span>Профиль</span></button>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSB()"></div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Добавить</h3>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveModal()">Сохранить</button>
    </div>
  </div>
</div>

function rSB(){
  function ni(n,lv){
    if(n.type==='sep')return`<div class="nsep" style="padding-left:${22+lv*14}px">${n.l}</div>`;
    const ac=ar===n.id,ca=n.x&&n.x.some(s=>ar===s.id||(s.x&&s.x.some(ss=>ar===ss.id))),ex=exp.has(n.id);
    let h=`<div class="n${Math.min(lv+1,3)}${(ac||ca)?' nac':''}" onclick="go('${n.id}',${!!n.x})">`;
    if(n.i&&!n.d)h+=`<span style="font-size:${lv===0?14:12}px">${n.i}</span>`;
    else if(n.d)h+=`<div style="width:${lv===0?7:5}px;height:${lv===0?7:5}px;border-radius:50%;background:${n.d};flex-shrink:0"></div>`;
    else h+=`<div style="width:14px"></div>`;
    h+=`<span style="flex:1">${n.l}</span>`;
    if(n.badge==='rvb'){const uc=reviews_.filter(r=>r.st==='pending').length+questions_.filter(q=>q.st==='pending').length;if(uc)h+=`<span class="sbd">${uc}</span>`;}
    if(n.badge==='nb'){const uc=notifs_.filter(x=>!x.rd).length;if(uc)h+=`<span class="sbd">${uc}</span>`;}
    if(n.x)h+=`<span style="font-size:10px;color:#9ca3af;margin-left:2px">${ex?'▲':'▼'}</span>`;
    h+=`</div>`;
    if(n.x&&ex)n.x.forEach(c=>{h+=ni(c,lv+1);});
    return h;
  }
  let h='';N.forEach(n=>{h+=ni(n,0);});
  document.getElementById('snav').innerHTML=h;
}

function go(id,hasX){
  ar=id;
  if(hasX){if(exp.has(id))exp.delete(id);else exp.add(id);}
  if(id==='supplies'||id==='sup-wb'||id==='sup-ozon'){ar=id==='supplies'?'sup-dash':id==='sup-wb'?'wb-msk':'ozon-msk';}
  if(id==='reviews')ar='rv-reviews';
  if(id==='marketing')ar='mkt-wb';
  rSB();rC();
  const titles={'sup-dash':'Остатки','rv-reviews':'Отзывы','taskhub':'Задачи','notif':'Уведомления','prof':'Профиль'};
  const mt=document.getElementById('mob-title');

  closeSB();
}

const chatW=(cid,h)=>{const m=msgs[cid]||[];return`<div class="cw" style="height:${h||430}px"><div class="cm" id="cmel-${cid}">${m.map(x=>mH(x)).join('')||'<div style="text-align:center;color:#9ca3af;padding:40px;font-size:12px">Нет сообщений</div>'}</div><div class="cb"><input type="text" id="cin-${cid}" placeholder="Написать в ${cmeta[cid]?.t||cid}..." onkeydown="if(event.key==='Enter')sC('${cid}')"><button class="sbtn" onclick="sC('${cid}')">➤</button></div></div>`};

function sC(cid){
  const i=document.getElementById('cin-'+cid);const tx=i?.value.trim();
  if(!tx)return;
  const tm=new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  if(!msgs[cid])msgs[cid]=[];
  msgs[cid].push({au:'Вы',in:'АП',tx,tm,me:true});
  i.value='';
  const el=document.getElementById('cmel-'+cid);
  if(el){const d=document.createElement('div');d.innerHTML=mH({au:'Вы',in:'АП',tx,tm,me:true});el.appendChild(d.firstChild);el.scrollTop=el.scrollHeight;}
}

// ── AI HANDLERS ───────────────────────────────────────────
async function aiR(id,type){
  const k=type==='q'?'q'+id:id;rvPhase[k]='gen';rC();
  try{
    const item=type==='q'?questions_.find(x=>x.id===id):reviews_.find(x=>x.id===id);
    const mpN={wb:'Wildberries',ozon:'Ozon',ym:'Яндекс Маркет',lamoda:'Lamoda'}[item.mp]||item.mp;
    const pr=type==='q'?`Напиши ответ продавца на маркетплейсе ${mpN} на вопрос: "${item.text}". 1-2 предложения. Только текст.`:`Напиши ответ продавца на маркетплейсе ${mpN} на отзыв (${item.rating}/5): "${item.text}". 2-3 предложения. Только текст.`;
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:pr}]})});
    const data=await res.json();
    rvDrafts[k]=data.content?.[0]?.text||'Ошибка генерации';
  }catch(e){rvDrafts[k]='Ошибка соединения. Проверьте подключение.';}
  rvPhase[k]='draft';rC();
}
function manR(id,t){const k=t==='q'?'q'+id:id;rvDrafts[k]='';rvPhase[k]='draft';rC();}
function saveR(id,t){
  const k=t==='q'?'q'+id:id;
  const el=document.getElementById((t==='q'?'qd-':'rd-')+id);
  const txt=el?el.value:(rvDrafts[k]||'');
  if(t==='q'){const q=questions_.find(x=>x.id===id);if(q){q.reply=txt;q.st='replied';}}
  else{const r=reviews_.find(x=>x.id===id);if(r){r.reply=txt;r.st='replied';}}
  delete rvPhase[k];delete rvDrafts[k];rC();rSB();
}
