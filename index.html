<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkSpace — e-commerce портал</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{font-size:13px;background:#f8f7ff;color:#1a1a2e;height:100vh;overflow:hidden}
.portal{display:flex;height:100vh;overflow:hidden}
.sb{width:210px;background:#f0effe;border-right:1px solid #e0dcff;display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s;z-index:40}
.lb{background:#534AB7;border-radius:8px;padding:9px 12px;margin:10px}
.lb-t{color:#EEEDFE;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.lb-s{color:#AFA9EC;font-size:10px;margin-top:2px;padding-left:4px}
#snav{flex:1;padding:5px;overflow-y:auto}
.ua{padding:9px 12px;border-top:1px solid #e0dcff;display:flex;align-items:center;gap:8px;cursor:pointer}
.ua:hover{background:#e8e4ff}
#main-wrap{display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden}
#ca{flex:1;overflow-y:auto;background:#fff;min-width:0}
#ct{padding:16px}
.n1,.n2,.n3{display:flex;align-items:center;cursor:pointer;border-radius:7px;margin-bottom:1px;color:#6b7280;user-select:none}
.n1{gap:8px;padding:7px 10px;font-size:12px}
.n2{gap:7px;padding:5px 10px 5px 22px;font-size:11px}
.n3{gap:5px;padding:4px 10px 4px 38px;font-size:11px}
.n1:hover,.n2:hover,.n3:hover{background:#fff;color:#1a1a2e}
.nac{background:#fff!important;color:#534AB7!important;font-weight:600!important}
.nsep{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#9ca3af;padding:7px 22px 3px;font-weight:500}
.sbd{background:#E24B4A;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:auto;font-weight:500}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
.tag{font-size:10px;padding:2px 7px;border-radius:8px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.ph-t{font-size:15px;font-weight:600;color:#1a1a2e}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:13px}
.sc{background:#f8f7ff;border-radius:8px;padding:11px}
.sc-v{font-size:18px;font-weight:600;margin:4px 0 2px}
.sc-l{font-size:10px;color:#6b7280}
.tabs{display:flex;border-bottom:1px solid #e5e7eb;margin-bottom:12px}
.tbi{padding:7px 14px;font-size:12px;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px}
.tbi.on{color:#534AB7;border-bottom-color:#534AB7;font-weight:600}
.cw{border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
.cm{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:7px}.msg.me{flex-direction:row-reverse}
.bub{padding:7px 10px;border-radius:14px;font-size:12px;max-width:75%;line-height:1.5}
.bo{background:#f8f7ff;color:#1a1a2e}.bm{background:#534AB7;color:#EEEDFE}
.ma{font-size:10px;color:#9ca3af;margin-bottom:2px}
.mt{font-size:10px;color:#9ca3af;margin-top:2px}
.cb{display:flex;gap:7px;padding:8px 10px;border-top:1px solid #e5e7eb;flex-shrink:0}
.cb input{flex:1;font-size:12px;border:1px solid #e5e7eb;border-radius:7px;padding:6px 10px;outline:none}
.cb input:focus{border-color:#534AB7}
button{background:#f0effe;color:#534AB7;border:1px solid #d4d0ff;border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit}
button:hover{background:#e8e4ff}
.sbtn{background:#534AB7;color:#EEEDFE;border:none;border-radius:7px;padding:0 12px;cursor:pointer;font-size:13px;height:34px;font-family:inherit}
.trow{display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid #f3f4f6}
.trow:last-child{border-bottom:none}
.tth{font-size:10px;font-weight:500;color:#9ca3af;padding:6px 13px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:9px;background:#fafafa}
.ai-btn{background:#534AB7;color:#EEEDFE;border:none;border-radius:7px;padding:5px 11px;cursor:pointer;font-size:11px;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.ai-spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#EEEDFE;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.rv-card{border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:9px}
.kpi-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6}
.kpi-row:last-child{border-bottom:none}
.k-col{background:#f8f7ff;border-radius:10px;padding:10px}
.k-card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:9px;margin-bottom:6px;cursor:pointer}
.k-card:hover{border-color:#534AB7}
.emp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.emp-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;text-align:center;cursor:pointer}
.emp-card:hover{border-color:#534AB7}
.pipe-row{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.okr-bar{height:6px;background:#f0effe;border-radius:3px;overflow:hidden;margin:6px 0}
.news-row{padding:10px 0;border-bottom:1px solid #f3f4f6}
.news-row:last-child{border-bottom:none}
/* Mobile */
.mob-topbar{display:none;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid #e0dcff;background:#f0effe;flex-shrink:0}
.hamburger{background:#f0effe;border:1px solid #d4d0ff;border-radius:7px;padding:6px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:#f0effe;border-top:1px solid #e0dcff;z-index:50;justify-content:space-around;align-items:center}
.mob-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 10px;border-radius:7px;color:#6b7280;font-size:10px;background:none;border:none}
.mob-nav-btn.active{color:#534AB7;font-weight:600}
.mob-nav-btn i{font-size:20px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
@media(max-width:640px){
  body{overflow:auto;height:auto}
  .portal{flex-direction:column;height:auto;min-height:100vh}
  .sb{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);width:230px;box-shadow:2px 0 12px rgba(0,0,0,.15)}
  .sb.open{transform:translateX(0)}
  .mob-topbar{display:flex}
  #main-wrap{padding-bottom:56px}
  #ca{height:auto;overflow:visible}
  #ct{padding:12px}
  .mob-nav{display:flex}
  .g3,.g4{grid-template-columns:1fr 1fr}
  .emp-grid{grid-template-columns:1fr 1fr}
  .tth{display:none}
  .trow{flex-wrap:wrap;gap:5px}
  .kanban-3col{grid-template-columns:1fr!important}
}
</style>
</head>
<body>
<div class="portal" id="portal">
<div class="sb" id="sidebar">
  <div><div class="lb"><div class="lb-t"><i class="ti ti-building-store" style="color:#CECBF6"></i>WorkSpace</div><div class="lb-s">e-commerce команда</div></div></div>

  <div class="ua" onclick="go('prof',false)">

  </div>
</div>

<div id="main-wrap">
<div class="mob-topbar">
  <div class="lb" style="margin:0;padding:6px 10px"><div class="lb-t" style="font-size:11px"><i class="ti ti-building-store" style="color:#CECBF6"></i>WorkSpace</div></div>
  <div id="mob-ttl" style="font-size:12px;font-weight:600;color:#1a1a2e">Главная</div>

</div>
<div id="ca"><div id="ct"></div></div>
<div class="mob-nav" id="mob-nav">
  <button class="mob-nav-btn active" onclick="mn('home',this)"><i class="ti ti-home"></i>Главная</button>
  <button class="mob-nav-btn" onclick="mn('sup-dash',this)"><i class="ti ti-truck"></i>Остатки</button>
  <button class="mob-nav-btn" onclick="mn('rv-reviews',this)"><i class="ti ti-star"></i>Отзывы</button>
  <button class="mob-nav-btn" onclick="mn('taskhub',this)"><i class="ti ti-layout-kanban"></i>Задачи</button>
  <button class="mob-nav-btn" onclick="mn('prof',this)"><i class="ti ti-users"></i>Команда</button>
</div>
</div>
<div class="overlay" id="overlay" onclick="closeSB()"></div>
</div>

<script>
const avC=['#CECBF6:#3C3489','#9FE1CB:#085041','#F5C4B3:#712B13','#F4C0D1:#72243E','#B5D4F4:#0C447C','#C0DD97:#27500A'];
const emps=[
  {in:'АП',nm:'Алексей Петров',role:'Руководитель',dept:'Управление',online:true},
  {in:'МС',nm:'Мария Соколова',role:'Менеджер по рекламе',dept:'Маркетинг',online:true},
  {in:'ИВ',nm:'Иван Волков',role:'Спец. по поставкам',dept:'Логистика',online:false},
  {in:'ЕК',nm:'Екатерина Климова',role:'Контент-менеджер',dept:'Контент',online:true},
  {in:'ДМ',nm:'Дмитрий Михайлов',role:'Аналитик',dept:'Аналитика',online:false},
  {in:'ОН',nm:'Ольга Никитина',role:'Менеджер WB',dept:'Маркетплейсы',online:true},

const chs={wb:{l:'WB',bg:'#FBEAF0',fg:'#993556'},ozon:{l:'Ozon',bg:'#E6F1FB',fg:'#185FA5'},ym:{l:'ЯМ',bg:'#FAEEDA',fg:'#854F0B'},lamoda:{l:'Lamoda',bg:'#F1EFE8',fg:'#2C2C2A'}};
const gm=id=>chs[id]||{l:id||'—',bg:'#F1EFE8',fg:'#5F5E5A'};
const mT=id=>{const m=gm(id);return`<span class="tag" style="background:${m.bg};color:${m.fg}">${m.l}</span>`};
const avE=(i,s)=>{const[bg,fg]=avC[i%avC.length].split(':');return`<div class="av" style="width:${s}px;height:${s}px;background:${bg};color:${fg};font-size:${Math.round(s*.38)}px">${emps[i]?.in||'?'}</div>`};
const mH=m=>{const i=emps.findIndex(e=>e.in===m.in);const[bg,fg]=avC[Math.max(0,i)%avC.length].split(':');return`<div class="msg${m.me?' me':''}"><div class="av" style="width:22px;height:22px;background:${m.me?'#CECBF6':bg};color:${m.me?'#3C3489':fg};font-size:8px;flex-shrink:0">${m.in}</div><div>${!m.me?`<div class="ma">${m.au}</div>`:''}<div class="bub ${m.me?'bm':'bo'}">${m.tx}</div><div class="mt" style="text-align:${m.me?'right':'left'}">${m.tm}</div></div></div>`};
const sbL=(st,map)=>{const[bg,fg,l]=map[st]||['#F1EFE8','#5F5E5A',st];return`<span class="tag" style="background:${bg};color:${fg}">${l}</span>`};
const chatW=(cid,h)=>{const m=msgs[cid]||[];return`<div class="cw" style="height:${h||430}px"><div class="cm" id="cmel-${cid}">${m.map(x=>mH(x)).join('')||'<div style="text-align:center;color:#9ca3af;padding:40px;font-size:12px">Нет сообщений</div>'}</div><div class="cb"><input type="text" id="cin-${cid}" placeholder="Написать..." onkeydown="if(event.key===\'Enter\')sC(\'${cid}\')"><button class="sbtn" onclick="sC('${cid}')"><i class="ti ti-send"></i></button></div></div>`};

let msgs={
  'wb-msk':[{au:'Иван Волков',in:'ИВ',tx:'Завтра отгрузка WB-МСК: 320 коробок, 09:00',tm:'10:15',me:false},{au:'Вы',in:'АП',tx:'Документы готовы?',tm:'10:17',me:true},{au:'Иван Волков',in:'ИВ',tx:'Да, всё готово ✓',tm:'10:18',me:false}],

  'home-chat':[{au:'Мария Соколова',in:'МС',tx:'Доброе утро всем! 🌅',tm:'09:01',me:false},{au:'Иван Волков',in:'ИВ',tx:'Доброе! Кто видел отчёт по WB за выходные?',tm:'09:05',me:false},{au:'Вы',in:'АП',tx:'Да, уже загрузил в базу знаний',tm:'09:10',me:true}],

};

];

  {id:2,date:'20 мая',batch:'П-2025-04',art:'LM-901234',nm:'Пальто кэмел',mp:'lamoda',qty:1,desc:'Кривая строчка на подкладке',st:'supplier'},

  {id:1,date:'25 мая',supply:'WB-МСК-320',mp:'wb',exp:320,rec:318,diff:-2,reason:'2 коробки повреждены при перевозке',st:'open'},
  {id:2,date:'20 мая',supply:'OZON-МСК-95',mp:'ozon',exp:95,rec:97,diff:+2,reason:'Лишние 2 единицы включены ошибочно',st:'closed'},

const stC=['#CECBF6','#B5D4F4','#FAC775','#F5C4B3','#C0DD97','#F7C1C1','#9FE1CB'];
const stT=['#3C3489','#0C447C','#633806','#712B13','#27500A','#791F1F','#085041'];
const objectives=[
  {title:'Выйти на оборот 5 млн/мес к Q3 2026',progress:67,krs:[{text:'Увеличить SKU до 80',prog:75},{text:'Запустить Lamoda',prog:40},{text:'CTR карточек WB выше 3%',prog:85}]},
  {title:'Автоматизировать 70% рутины',progress:42,krs:[{text:'Подключить API МойСклад',prog:60},{text:'Настроить автобид на всех МП',prog:50},{text:'Внедрить портал',prog:90}]},
];

function rSB(){
  function ni(n,lv){
    if(n.type==='sep')return`<div class="nsep" style="padding-left:${22+lv*14}px">${n.l}</div>`;
    const ac=ar===n.id,ca=n.x&&n.x.some(s=>ar===s.id||(s.x&&s.x.some(ss=>ar===ss.id))),ex=exp.has(n.id);
    let h=`<div class="n${Math.min(lv+1,3)}${(ac||ca)?' nac':''}" onclick="go('${n.id}',${!!n.x})">`;
    if(n.i&&!n.d)h+=`<span style="font-size:${lv===0?14:12}px">${n.i}</span>`;
    else if(n.d)h+=`<div style="width:${lv===0?7:5}px;height:${lv===0?7:5}px;border-radius:50%;background:${n.d};flex-shrink:0"></div>`;
    else h+=`<div style="width:14px"></div>`;
    h+=`<span style="flex:1">${n.l}</span>`;
    if(n.badge==='rvb'){const uc=reviews_.filter(r=>r.st==='pending').length+questions_.filter(q=>q.st==='pending').length;if(uc)h+=`<span class="sbd">${uc}</span>`;}
    if(n.badge==='nb')h+=`<span class="sbd" id="nb">5</span>`;
    if(n.x)h+=`<span style="font-size:10px;color:#9ca3af">${ex?'▲':'▼'}</span>`;
    h+=`</div>`;
    if(n.x&&ex)n.x.forEach(c=>{h+=ni(c,lv+1);});
    return h;
  }
  let h='';N.forEach(n=>{h+=ni(n,0);});
  document.getElementById('snav').innerHTML=h;
}

async function aiR(id,type){
  const k=type==='q'?'q'+id:id;rvPhase[k]='gen';rC();
  try{
    const item=type==='q'?questions_.find(x=>x.id===id):reviews_.find(x=>x.id===id);
    const mpN={wb:'Wildberries',ozon:'Ozon',ym:'Яндекс Маркет',lamoda:'Lamoda'}[item.mp]||item.mp;
    const pr=type==='q'?`Напиши ответ продавца на маркетплейсе ${mpN} на вопрос: "${item.text}". 1-2 предложения. Только текст.`:`Напиши ответ продавца на маркетплейсе ${mpN} на отзыв (${item.rating}/5): "${item.text}". 2-3 предложения. Только текст.`;
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:pr}]})});
    const data=await res.json();
    rvDrafts[k]=data.content?.[0]?.text||'Ошибка генерации';
  }catch(e){rvDrafts[k]='Ошибка соединения с AI.';}
  rvPhase[k]='draft';rC();
}

function sC(cid){
  const inp=document.getElementById('cin-'+cid);
  if(!inp||!inp.value.trim())return;
  const tx=inp.value.trim();
  const tm=new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  if(!msgs[cid])msgs[cid]=[];
  msgs[cid].push({au:'Вы',in:'АП',tx,tm,me:true});
  inp.value='';
  const el=document.getElementById('cmel-'+cid);
  if(el){const d=document.createElement('div');d.innerHTML=mH({au:'Вы',in:'АП',tx,tm,me:true});el.appendChild(d.firstChild);el.scrollTop=el.scrollHeight;}
}
window.sC=sC;

function toggleSB(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('overlay');
  sb.classList.toggle('open');
  ov.style.display=sb.classList.contains('open')?'block':'none';
}
function closeSB(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('overlay');
  sb.classList.remove('open');
  ov.style.display='none';
}

function mn(s,btn){
  document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));

}
